name: CI

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read # for nx shas

on:
  merge_group: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  ci-validate:
    uses: Inthememory/project-config/.github/workflows/ci.yml@9abb4341a135fcea7608ce35f03f7ed4a7bbb61e # main
    secrets: inherit
