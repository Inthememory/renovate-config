name: CI

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read # for nx shas

on:
  merge_group: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  ci-validate:
    uses: Inthememory/project-config/.github/workflows/ci.yml@2f8150ce0e9515eb146b61e3b2eb329c0455a1d8 # main
    secrets: inherit
