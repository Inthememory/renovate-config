name: CI

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read # for nx shas

on:
  merge_group: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # TODO: the workflow are private and cannot be accessed by a public repository
  # ci-validate:
  #   uses: Inthememory/project-config/.github/workflows/ci.yml@0a15b12c959e7881b710f40f70ce2d4ecde98df4 # main
  #   secrets: inherit

  ci-validate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 📌 Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: '.tool-versions'
          cache: 'pnpm'

      - name: 🔧 Configure npm for GitHub Packages
        shell: bash
        run: npm config set "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" --location=user
      # install dependencies
      - name: 📦 Install dependencies
        run: pnpm install
      # validate
      - name: ✅ Validate
        run: pnpm run validate
