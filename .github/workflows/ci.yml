name: CI

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read # for nx shas

on:
  merge_group: {}
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  ci-validate:
    uses: Inthememory/project-config/.github/workflows/ci.yml@2f9294c357cedf8f99ff52fdeef1c391e1b5e3ff # main
    secrets: inherit
